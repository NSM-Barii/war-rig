<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <filter id="saberGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="saberCore" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f7e08a"/>
      <stop offset="40%"  stop-color="#c8a84b"/>
      <stop offset="100%" stop-color="#7a5c10"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#080205"/>
      <stop offset="50%"  stop-color="#0f0308"/>
      <stop offset="100%" stop-color="#050105"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3d0a0a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#080205" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bgGrad)"/>
  <rect width="900" height="320" fill="url(#centerGlow)"/>

  <!-- Stars layer 1 — dim -->
  <g fill="#ffffff" opacity="0.25">
    <circle cx="30"  cy="12"  r="0.8"/><circle cx="87"  cy="45"  r="0.6"/>
    <circle cx="145" cy="8"   r="0.9"/><circle cx="203" cy="31"  r="0.5"/>
    <circle cx="260" cy="19"  r="0.7"/><circle cx="318" cy="5"   r="0.6"/>
    <circle cx="375" cy="27"  r="0.8"/><circle cx="432" cy="14"  r="0.5"/>
    <circle cx="490" cy="38"  r="0.9"/><circle cx="547" cy="9"   r="0.6"/>
    <circle cx="605" cy="22"  r="0.7"/><circle cx="662" cy="43"  r="0.8"/>
    <circle cx="720" cy="7"   r="0.5"/><circle cx="777" cy="28"  r="0.9"/>
    <circle cx="835" cy="16"  r="0.6"/><circle cx="870" cy="41"  r="0.7"/>
    <circle cx="15"  cy="80"  r="0.6"/><circle cx="72"  cy="110" r="0.8"/>
    <circle cx="130" cy="95"  r="0.5"/><circle cx="188" cy="120" r="0.7"/>
    <circle cx="780" cy="90"  r="0.8"/><circle cx="830" cy="115" r="0.6"/>
    <circle cx="855" cy="75"  r="0.9"/><circle cx="893" cy="100" r="0.5"/>
    <circle cx="20"  cy="230" r="0.7"/><circle cx="60"  cy="260" r="0.5"/>
    <circle cx="110" cy="245" r="0.8"/><circle cx="800" cy="240" r="0.6"/>
    <circle cx="845" cy="265" r="0.9"/><circle cx="880" cy="250" r="0.7"/>
    <circle cx="40"  cy="300" r="0.5"/><circle cx="95"  cy="310" r="0.8"/>
    <circle cx="820" cy="295" r="0.6"/><circle cx="870" cy="305" r="0.7"/>
  </g>

  <!-- Stars layer 2 — brighter -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="55"  cy="25"  r="1.2"/><circle cx="170" cy="48"  r="1.0"/>
    <circle cx="295" cy="11"  r="1.3"/><circle cx="420" cy="33"  r="0.9"/>
    <circle cx="545" cy="20"  r="1.1"/><circle cx="670" cy="15"  r="1.2"/>
    <circle cx="795" cy="38"  r="1.0"/><circle cx="860" cy="22"  r="1.3"/>
    <circle cx="25"  cy="270" r="1.1"/><circle cx="155" cy="285" r="0.9"/>
    <circle cx="750" cy="275" r="1.2"/><circle cx="875" cy="288" r="1.0"/>
  </g>

  <!-- Stars layer 3 — brightest -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="110" cy="18"  r="1.5"/><circle cx="460" cy="8"   r="1.4"/>
    <circle cx="740" cy="25"  r="1.6"/><circle cx="68"  cy="290" r="1.4"/>
    <circle cx="832" cy="282" r="1.5"/>
  </g>

  <!-- Curved lightsaber blade — outer glow -->
  <line x1="0" y1="260" x2="900" y2="60"
        stroke="#8b0000" stroke-width="20" stroke-linecap="round"
        opacity="0.15" filter="url(#saberGlow)"/>

  <!-- Curved lightsaber blade — mid glow -->
  <line x1="0" y1="260" x2="900" y2="60"
        stroke="#cc1111" stroke-width="8" stroke-linecap="round"
        opacity="0.35" filter="url(#saberGlow)"/>

  <!-- Curved lightsaber blade — inner glow -->
  <line x1="0" y1="260" x2="900" y2="60"
        stroke="#ff3333" stroke-width="4" stroke-linecap="round"
        opacity="0.6" filter="url(#saberCore)"/>

  <!-- Curved lightsaber blade — core -->
  <line x1="0" y1="260" x2="900" y2="60"
        stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"
        opacity="0.85"/>

  <!-- Decorative top rule -->
  <line x1="80" y1="52" x2="820" y2="52" stroke="#c8a84b" stroke-width="0.8" opacity="0.4"/>

  <!-- DOOKU main title -->
  <text x="450" y="170"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="118" font-weight="bold"
        text-anchor="middle"
        fill="#8b0000"
        opacity="0.25"
        letter-spacing="18"
        filter="url(#textGlow)">DOOKU</text>

  <text x="450" y="170"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="118" font-weight="bold"
        text-anchor="middle"
        fill="url(#goldGrad)"
        letter-spacing="18"
        filter="url(#subtleGlow)">DOOKU</text>

  <!-- Subtitle -->
  <text x="450" y="208"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="15" font-weight="normal"
        text-anchor="middle"
        fill="#c8a84b"
        letter-spacing="9"
        opacity="0.85">NSM  WARDRIVING  SUITE</text>

  <!-- Decorative rule below subtitle -->
  <line x1="220" y1="222" x2="680" y2="222" stroke="#c8a84b" stroke-width="0.6" opacity="0.35"/>

  <!-- Small separator diamonds -->
  <polygon points="448,218 451,222 448,226 445,222" fill="#c8a84b" opacity="0.5"/>

  <!-- Bottom quote -->
  <text x="450" y="270"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="11.5" font-style="italic"
        text-anchor="middle"
        fill="#7a5c10"
        letter-spacing="1"
        opacity="0.8">"I have become more powerful than any Jedi."  —  Count Dooku</text>

  <!-- Bottom rule -->
  <line x1="80" y1="282" x2="820" y2="282" stroke="#c8a84b" stroke-width="0.8" opacity="0.4"/>

  <!-- Corner accents -->
  <g stroke="#c8a84b" stroke-width="1" fill="none" opacity="0.4">
    <polyline points="80,52 60,52 60,72"/>
    <polyline points="820,52 840,52 840,72"/>
    <polyline points="80,282 60,282 60,262"/>
    <polyline points="820,282 840,282 840,262"/>
  </g>
</svg>
