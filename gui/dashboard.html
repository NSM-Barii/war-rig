<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Dooku</title>
  <style>
    :root {
      --bg:        #080808;
      --surface:   #0f0f0f;
      --border:    #1e1414;
      --text:      #ececec;
      --muted:     #555;
      --wifi:      #dc143c;
      --wifi-bg:   #1a0208;
      --ble:       #4eaaff;
      --ble-bg:    #091a2e;
      --kismet:    #c8a84b;
      --kismet-bg: #1a1408;
      --rssi:      #ff6b35;
      --accent:    #fff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 16px 20px 0;
      border-bottom: 1px solid var(--border);
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 4px;
      color: var(--wifi);
    }

    .pulse {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .pulse.live { background: var(--wifi); box-shadow: 0 0 8px var(--wifi); }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 0;
      text-align: center;
    }

    .stat .val {
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
    }

    .stat .lbl {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    .stat.total   .val { color: var(--accent); }
    .stat.wifi    .val { color: var(--wifi); }
    .stat.ble     .val { color: var(--ble); }
    .stat.packets .val { color: var(--rssi); }

    /* ── MAIN TABS ── */
    .tabs {
      display: flex;
      border-top: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab.active { color: var(--wifi); border-color: var(--wifi); }

    .tab.kismet-link {
      color: var(--kismet);
      border-bottom: 2px solid transparent;
    }
    .tab.kismet-link:active { border-color: var(--kismet); }

    /* ── FEED ── */
    .feed {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card.wifi { border-left: 3px solid var(--wifi); }
    .card.ble  { border-left: 3px solid var(--ble); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 3px 9px;
      border-radius: 6px;
    }

    .badge.wifi { background: var(--wifi-bg); color: var(--wifi); }
    .badge.ble  { background: var(--ble-bg);  color: var(--ble); }

    .rssi { font-size: 13px; color: var(--rssi); font-weight: 600; }

    .name {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mac {
      font-size: 12px;
      color: var(--muted);
      font-family: monospace;
      letter-spacing: 0.5px;
    }

    .meta { display: flex; gap: 12px; flex-wrap: wrap; }
    .meta span { font-size: 11px; color: var(--muted); }
    .meta span b { color: #888; }

    .frames {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
      background: #1a0800;
      color: var(--rssi);
    }

    .frames.hot {
      background: #2a1000;
      color: #ff4500;
      box-shadow: 0 0 6px rgba(255,69,0,0.3);
    }

    /* ── EMPTY ── */
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 60px 20px;
    }
    .empty .icon { font-size: 36px; margin-bottom: 12px; }

    /* ── BOTTOM BAR ── */
    .bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(8,8,8,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }

    .ssh-btn {
      background: #1a0208;
      color: #dc143c;
      border: 1px solid #dc143c44;
      border-radius: 8px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .ssh-btn:active { background: #2a0410; }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo">DOOKU</div>
    <div class="pulse" id="pulse"></div>
  </div>

  <div class="stats" id="flock-stats">
    <div class="stat total">  <div class="val" id="cnt-total">0</div><div class="lbl">Total</div></div>
    <div class="stat wifi">   <div class="val" id="cnt-wifi">0</div> <div class="lbl">WiFi</div></div>
    <div class="stat ble">    <div class="val" id="cnt-ble">0</div>  <div class="lbl">BLE</div></div>
    <div class="stat packets"><div class="val" id="cnt-pkts">0</div> <div class="lbl">Pkts</div></div>
  </div>

  <div class="tabs">
    <div class="tab active">FLOCK</div>
    <div class="tab kismet-link" id="kismet-btn">KISMET ↗</div>
  </div>
</header>

<div class="feed" id="flock-feed"></div>

<div class="bottom">
  <span id="last-update">Waiting...</span>
  <button class="ssh-btn" id="ssh-btn">SSH MODE</button>
  <span style="color:#dc143c;font-weight:700;letter-spacing:2px">DOOKU</span>
</div>

<script>
  const pulse      = document.getElementById("pulse");
  const lastUpdate = document.getElementById("last-update");
  const flockFeed  = document.getElementById("flock-feed");


  // ── KISMET LINK ──
  document.getElementById("kismet-btn").addEventListener("click", () => {
    window.open("http://10.10.10.1:2501", "_blank");
  });


  // ── FLOCK RENDER ──
  function renderFlock(devices) {
    document.getElementById("cnt-total").textContent = devices.length;
    document.getElementById("cnt-wifi").textContent  = devices.filter(d => d.type === "wifi").length;
    document.getElementById("cnt-ble").textContent   = devices.filter(d => d.type === "ble").length;
    document.getElementById("cnt-pkts").textContent  = devices.reduce((s, d) => s + (d.frame_count || 0), 0);

    if (!devices.length) {
      flockFeed.innerHTML = `<div class="empty"><div class="icon">⚔️</div>Scanning... no Flock devices found yet.</div>`;
      return;
    }

    flockFeed.innerHTML = [...devices].reverse().map(d => {
      const type  = d.type === "ble" ? "ble" : "wifi";
      const name  = d.ssid || d.local_name || "<hidden>";
      const rssi  = d.rssi != null ? `${d.rssi} dBm` : "—";
      const mac   = d.mac  ?? "—";
      const time  = d.time_stamp ?? "—";

      const extras = type === "wifi"
        ? `<span><b>ch</b> ${d.channel ?? "—"}</span><span><b>enc</b> ${d.encryption ?? "—"}</span>`
        : `<span><b>uuid</b> ${d.uuids ? "yes" : "no"}</span>`;

      const frames = d.frame_count || 0;
      const hot    = frames >= 10;
      const pktBadge = frames > 0 ? `<span class="frames ${hot ? "hot" : ""}">${frames} pkts</span>` : "";

      return `
        <div class="card ${type}">
          <div class="card-top">
            <span class="badge ${type}">${type.toUpperCase()}</span>
            <span class="rssi">${rssi}</span>
          </div>
          <div class="name">${name}</div>
          <div class="mac">${mac}</div>
          <div class="meta">${extras}${pktBadge}<span>${time}</span></div>
        </div>`;
    }).join("");
  }


  // ── POLL FLOCK ──
  async function pollFlock() {
    try {
      const res  = await fetch("/data");
      const data = await res.json();
      renderFlock(data);
      pulse.className    = "pulse live";
      lastUpdate.textContent = `Updated ${new Date().toLocaleTimeString()}`;
    } catch {
      pulse.className    = "pulse";
      lastUpdate.textContent = "Connection lost";
    }
  }


  // ── SSH ──
  document.getElementById("ssh-btn").addEventListener("click", async () => {
    if (!confirm("Drop AP and switch to SSH mode?")) return;
    await fetch("/ssh-mode");
  });


  // ── START ──
  pollFlock();
  setInterval(pollFlock, 2000);
</script>
</body>
</html>
